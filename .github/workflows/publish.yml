name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify release tag matches project version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          PROJECT_VERSION="$(python -c "import pathlib, tomllib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")"
          if [ "$RELEASE_TAG" != "$PROJECT_VERSION" ] && [ "$RELEASE_TAG" != "v$PROJECT_VERSION" ]; then
            echo "Release tag '$RELEASE_TAG' does not match project version '$PROJECT_VERSION' (or 'v$PROJECT_VERSION')."
            exit 1
          fi

      - name: Build distribution
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
