<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" role="img" aria-labelledby="title desc">
  <title id="title">Sable logo</title>
  <desc id="desc">A cute sable mascot next to the word Sable.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6ead7" />
      <stop offset="100%" stop-color="#f3dfc0" />
    </linearGradient>
    <linearGradient id="fur" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a3528" />
      <stop offset="100%" stop-color="#2e2018" />
    </linearGradient>
  </defs>

  <rect width="720" height="260" rx="32" fill="url(#bg)" />

  <g transform="translate(70 32)">
    <ellipse cx="110" cy="170" rx="90" ry="38" fill="#d9bf98" opacity="0.55" />
    <ellipse cx="105" cy="115" rx="76" ry="58" fill="url(#fur)" />
    <ellipse cx="57" cy="74" rx="24" ry="30" fill="url(#fur)" />
    <ellipse cx="153" cy="74" rx="24" ry="30" fill="url(#fur)" />
    <ellipse cx="57" cy="84" rx="12" ry="14" fill="#e6caa4" opacity="0.85" />
    <ellipse cx="153" cy="84" rx="12" ry="14" fill="#e6caa4" opacity="0.85" />

    <ellipse cx="82" cy="114" rx="7" ry="8" fill="#1a1411" />
    <ellipse cx="128" cy="114" rx="7" ry="8" fill="#1a1411" />
    <circle cx="80" cy="111" r="2" fill="#ffffff" opacity="0.8" />
    <circle cx="126" cy="111" r="2" fill="#ffffff" opacity="0.8" />

    <ellipse cx="105" cy="133" rx="8" ry="6" fill="#1a1411" />
    <path d="M97 141 Q105 149 113 141" fill="none" stroke="#1a1411" stroke-width="3" stroke-linecap="round" />

    <path d="M18 152 C-10 145 -18 111 6 92" fill="none" stroke="#2b1d15" stroke-width="14" stroke-linecap="round" />
    <path d="M194 152 C236 142 248 96 214 74" fill="none" stroke="#2b1d15" stroke-width="14" stroke-linecap="round" />

